<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register Donor</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand"><span class="brand-mark"></span><span><strong class="brand-title">Blood Bridge</strong><span class="brand-subtitle">Register donor</span></span></div>
        <nav class="nav-actions"><a class="nav-link" href="donor.html">Donor Portal</a><a class="nav-link" href="donor-login.html">Login</a></nav>
      </div>
    </header>
    <main class="container">
      <section class="panel">
        <div class="panel-header"><div><h1>Register Donor</h1><p>Submit donor details to create a new donor record.</p></div><span class="pill info">Process 1.0</span></div>
        <div class="panel-body">
          <form class="form-grid">
            <label>Full name<input value="Tan Zhi Qian"></label>
            <label>Blood type<select><option>A+</option><option>O+</option><option>B+</option><option>AB+</option><option>A-</option><option>O-</option></select></label>
            <label>Phone<input value="012-345 6789"></label>
            <label>Email<input type="email" value="donor@student.mmu.edu.my"></label>
            <label>Address<input value="Cyberjaya, Selangor"></label>
            <label>Date of birth<input type="date" value="2004-05-12"></label>
            <label class="full">Emergency contact<input value="012-888 9911"></label>
            <button class="btn-primary full" type="button" data-action="register">Submit Registration</button>
          </form>
        </div>
      </section>
    </main>
  </div>
  <div class="toast"></div>
</body>
</html>
